name: Enhance homepage

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/enhance-homepage.yml'

permissions:
  contents: write

jobs:
  enhance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update homepage content and metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          replacements = [
            ('content="Research and engineering portfolio of Williams Maikol Bouzid — radar and sonar signal processing, statistical detection, computer vision, control and embedded systems."', 'content="Portfolio of Williams Maikol Bouzid, MSc engineer and research intern in complex systems, biomechanics, OpenSim, SCONE, radar and sonar signal processing, computer vision, control and embedded systems."'),
            ('content="Complex systems engineering portfolio focused on radar and sonar signal processing, statistical detection, perception, control and applied research."', 'content="Engineering and research portfolio of Williams Maikol Bouzid, focused on biomechanics, OpenSim, SCONE, radar and sonar signal processing, perception, control and scientific validation."'),
            ('<meta name="twitter:description" content="Radar, sonar and statistical signal processing within a complex systems engineering portfolio.">', '<meta name="twitter:description" content="Complex systems, biomechanics, OpenSim, SCONE, radar, sonar, signal processing, perception and control.">'),
            ('<title>Williams Maikol Bouzid — Engineering &amp; Research</title>', '<title>Williams Maikol Bouzid | Complex Systems, Biomechanics &amp; Signal Processing</title>'),
            ('<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">', '<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">\n    <link rel="manifest" href="site.webmanifest">\n    <meta name="author" content="Williams Maikol Bouzid">\n    <meta name="keywords" content="Williams Maikol Bouzid, complex systems engineer, biomechanics, OpenSim, SCONE, radar, sonar, signal processing, computer vision, control systems, embedded systems, PhD, CIFRE">'),
            ('          "Complex Systems Engineering"\n        ]', '          "Complex Systems Engineering",\n          "Biomechanics",\n          "OpenSim",\n          "SCONE",\n          "Motion Induced Interruptions",\n          "Scientific Computing",\n          "Model Validation"\n        ]'),
            ('            <strong>Williams Bouzid</strong>', '            <strong>Williams Maikol Bouzid</strong>'),
            ('            <h1>\n              <span data-i18n="heroLine1">Engineering</span>', '            <p class="sr-only">Williams Maikol Bouzid — complex systems engineer and research intern.</p>\n            <h1>\n              <span data-i18n="heroLine1">Engineering</span>'),
            ('              Final-year MSc student and research intern working across signal processing, computer vision,\n              estimation, control and embedded systems, with a focused academic track in radar and sonar.', '              I am Williams Maikol Bouzid, a final-year MSc engineering student and research intern working across\n              biomechanics, OpenSim and SCONE modelling, signal processing, computer vision, estimation, control\n              and embedded systems, with a focused academic track in radar and sonar.'),
            ('              <span>Embedded systems</span>', '              <span>Embedded systems</span>\n              <span>Biomechanics · OpenSim · SCONE</span>'),
            ('              moving between theory and implementation: from robust estimation and detection to embedded\n              sensing, simulation and validation. I am particularly interested in radar and sonar signal\n              processing, statistical decision theory and optimal filtering.', '              moving between theory and implementation: from robust estimation and detection to embedded sensing,\n              musculoskeletal simulation and validation. My current research includes biomechanics, OpenSim, SCONE\n              and human stability in marine environments, alongside radar and sonar signal processing, statistical\n              decision theory and optimal filtering.'),
            ('              My final-year internship explores how numerical models can support the study of human response\n              in dynamic environments. The work combines scientific computing, parameter estimation and\n              validation. Technical details and results remain intentionally limited while the project is ongoing.', '              My final-year internship studies Motion Induced Interruptions and postural stability in marine\n              environments. The work combines OpenSim musculoskeletal modelling, SCONE simulations, biomechanical\n              data processing, inverse kinematics, inverse dynamics, static optimisation, seakeeping concepts and\n              critical model validation. Technical details remain selective while the project is ongoing.'),
            ('                <p data-i18n="timeline1Body">Applied modelling, scientific computing, estimation and validation in a multidisciplinary research setting.</p>', '                <p data-i18n="timeline1Body">Biomechanics, OpenSim, SCONE, postural stability, scientific computing and validation in a multidisciplinary marine-research setting.</p>'),
            ('                <li>PID, LQR &amp; state-space methods</li>', '                <li>PID, LQR &amp; state-space methods</li>\n                <li>OpenSim: IK, ID &amp; static optimisation</li>\n                <li>SCONE biomechanical simulation &amp; validation</li>'),
            ('                <li>LTspice · Vivado</li>', '                <li>LTspice · Vivado</li>\n                <li>OpenSim · SCONE</li>'),
          ]

          changed = 0
          for old, new in replacements:
              if old in s and new not in s:
                  s = s.replace(old, new)
                  changed += 1

          contact_pattern = re.compile(
              r'opportunities from October–November 2026, especially in radar, sonar, statistical signal\s+processing and multisensor systems\.'
          )
          s, n = contact_pattern.subn(
              'opportunities from October–November 2026, especially in biomechanics, modelling and simulation, radar, sonar, statistical signal processing, control and multisensor systems.',
              s,
              count=1,
          )
          changed += n

          p.write_text(s, encoding='utf-8')
          print(f'Applied {changed} homepage enhancements.')
          PY
      - name: Commit enhancements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Improve homepage SEO and research positioning" || exit 0
          git push